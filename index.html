<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWOHANDS</title>
</head>
<body style="margin:0">
<div id="cfApp"></div>
<style>
  :root{
    --ink:#1B2B44; --ink2:#4A5A72; --paper:#F5F7FA; --card:#FFFFFF;
    --line:#E1E6EE; --line2:#C9D2DF;
    --in:#0E8A5F; --out:#D64545; --accent:#2B5FAD; --accent-soft:#EAF1FB;
    --warn-bg:#FDECEC; --ok-bg:#E9F6F0;
    --mono:'SF Mono',Consolas,'Malgun Gothic',monospace;
  }
  #cfApp{font-family:'Pretendard Variable',Pretendard,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    color:var(--ink); background:var(--paper); min-height:100vh;
    font-size:clamp(13px, 0.55vw + 11px, 16px); line-height:1.5;}
  #cfApp *{box-sizing:border-box;}
  .cf-head{background:var(--ink); color:#fff; padding:14px 20px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;}
  .cf-head h1{margin:0; font-size:clamp(15px, 1.1vw + 11px, 20px); font-weight:700; letter-spacing:-.02em;}
  .cf-head .sub{font-size:12px; color:#9FB0C8;}
  .cf-tabs{display:flex; gap:2px; background:var(--ink); padding:0 12px; overflow-x:auto;}
  .cf-tab{background:transparent; border:none; color:#9FB0C8; padding:10px 16px; font-size:13.5px; font-weight:600;
    cursor:pointer; border-radius:8px 8px 0 0; white-space:nowrap; font-family:inherit;}
  .cf-tab.on{background:var(--paper); color:var(--ink);}
  .cf-body{padding:clamp(12px,1.4vw,24px) clamp(10px,2vw,28px) 60px; width:100%; max-width:min(96vw,1600px); margin:0 auto;}
  .cf-card{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px 18px; margin-bottom:16px;}
  .cf-card h2{margin:0 0 4px; font-size:15px; font-weight:700;}
  .cf-note{font-size:12px; color:var(--ink2); margin:0 0 12px;}
  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(clamp(130px,14vw,180px),1fr)); gap:10px; margin-bottom:16px;}
  .kpi{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px;}
  .kpi .k{font-size:11.5px; color:var(--ink2); margin-bottom:4px;}
  .kpi .v{font-size:17px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
  .kpi .v.neg{color:var(--out);} .kpi .v.pos{color:var(--in);}
  .tbl-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:8px;}
  table.cf{border-collapse:collapse; width:100%; font-size:13px;}
  table.cf th{background:#EDF1F7; color:var(--ink2); font-weight:700; font-size:12px; padding:7px 10px;
    border-bottom:1px solid var(--line2); text-align:left; white-space:nowrap; position:sticky; top:0;}
  table.cf td{padding:6px 10px; border-bottom:1px solid var(--line); white-space:nowrap; vertical-align:middle;}
  table.cf tr:last-child td{border-bottom:none;}
  td.num,th.num{text-align:right; font-variant-numeric:tabular-nums;}
  .neg{color:var(--out);} .pos{color:var(--in);}
  .row-sec td{background:#F0F4FA; font-weight:800; color:var(--ink);}
  .row-sum td{background:#FBFCFE; font-weight:700; border-top:1px solid var(--line2);}
  .row-final td{background:var(--ink); color:#fff; font-weight:800;}
  .row-final td.neg{color:#FF9B9B;}
  .sticky-col{position:sticky; left:0; background:inherit; z-index:1;}
  table.cf td.sticky-col{background:#fff;} table.cf .row-sec td.sticky-col{background:#F0F4FA;}
  table.cf .row-sum td.sticky-col{background:#FBFCFE;} table.cf .row-final td.sticky-col{background:var(--ink);}
  .badge{display:inline-block; padding:1px 8px; border-radius:20px; font-size:11.5px; font-weight:700;}
  .b-ok{background:var(--ok-bg); color:var(--in);} .b-warn{background:var(--warn-bg); color:var(--out);}
  .b-hold{background:#F1F1F4; color:#7A7A88;} .b-plan{background:var(--accent-soft); color:var(--accent);}
  .b-done{background:#EDEAF9; color:#5B4CB3;}
  .form-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px 12px; margin-bottom:12px;}
  .fld label{display:block; font-size:11.5px; color:var(--ink2); font-weight:700; margin-bottom:3px;}
  .fld input,.fld select,.fld textarea{width:100%; padding:7px 9px; border:1px solid var(--line2); border-radius:7px;
    font-size:13px; font-family:inherit; background:#fff; color:var(--ink);}
  .fld input:focus,.fld select:focus{outline:2px solid var(--accent); outline-offset:-1px; border-color:var(--accent);}
  .fld input[readonly]{background:#F2F4F8; color:var(--ink2);}
  .btns{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .btn{border:none; border-radius:7px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;}
  .btn-p{background:var(--accent); color:#fff;} .btn-p:hover{background:#234E90;}
  .btn-g{background:#EDF1F7; color:var(--ink);} .btn-g:hover{background:#E1E7F0;}
  .btn-d{background:var(--warn-bg); color:var(--out);}
  .btn-xs{padding:3px 9px; font-size:12px; border-radius:6px;}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px;}
  .toolbar select,.toolbar input{padding:6px 9px; border:1px solid var(--line2); border-radius:7px; font-size:13px; font-family:inherit;}
  .empty{padding:30px; text-align:center; color:var(--ink2); font-size:13px;}
  .chart-wrap{overflow-x:auto;}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:9px 18px; border-radius:8px; font-size:13px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:99;}
  .toast.show{opacity:1;}
  .file-tag{font-size:11px; color:var(--ink2); background:#EDF1F7; border-radius:5px; padding:2px 7px; font-family:var(--mono);}
  /* 태블릿 이하 */
  @media (max-width:820px){
    .cf-tab{padding:9px 12px;}
    .toolbar{gap:6px;}
    .toolbar select,.toolbar input{flex:1 1 45%;}
  }
  /* 휴대폰 */
  @media (max-width:560px){
    .cf-head{padding:11px 14px;}
    .cf-tabs{padding:0 6px;}
    .cf-tab{padding:8px 10px; font-size:13px;}
    .cf-card{padding:13px 13px;}
    .kpis{grid-template-columns:repeat(2,1fr); gap:8px;}
    .kpi .v{font-size:15px;}
    .form-grid{grid-template-columns:1fr 1fr;}
    .btns{width:100%;}
    .btns .btn{flex:1 1 auto;}
    .toolbar select,.toolbar input{flex:1 1 100%;}
    #syncBadge{width:100%; margin-left:0 !important;}
  }
  /* 아주 좁은 화면 */
  @media (max-width:380px){
    .kpis{grid-template-columns:1fr;}
    .form-grid{grid-template-columns:1fr;}
  }
</style>
<div class="toast" id="toast"></div>
<script>
(function(){
  // ===== 데이터 저장: 데이터셋별 별도 파일(키) 관리 =====
  const FILES = {
    settings:    'cashflow_settings.json',
    transactions:'cashflow_transactions.json',
    recurring:   'cashflow_recurring.json',
    debtinvest:  'cashflow_debtinvest.json'
  };
  const INCOME_CATS  = ['매출 수금','기타 영업수입'];
  const EXPENSE_CATS = ['매입/외주비','급여/4대보험','임차료','마케팅','일반관리비','세금/부가세','기타 영업지출'];
  const INVEST_CATS  = ['CapEx/자산구입','투자/보증금'];
  const FINANCE_CATS = ['대출 실행','원금 상환','이자 지급','증자/출자'];
  const DI_CATS = INVEST_CATS.concat(FINANCE_CATS);
  const DI_INFLOW = {'대출 실행':1,'증자/출자':1};

  let db = { settings:null, transactions:[], recurring:[], debtinvest:[] };
  let tab = 'dashboard';
  let editId = { transactions:null, recurring:null, debtinvest:null };
  let txFilter = { month:'', type:'', status:'', text:'' };

  const SEED = {
    settings: { startMonth:'2026-08', openingCash:0, minBuffer:0, taxMemo:'', basis:'현금주의' },
    transactions: [],
    recurring: [],
    debtinvest: []
  };

  function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function fmt(n){
    if(n===null||n===undefined||isNaN(n)) return '';
    const v=Math.round(n*10)/10;
    const s=Math.abs(v).toLocaleString('ko-KR');
    return v<0 ? '('+s+')' : s;
  }
  function cls(n){ return n<0?'num neg':(n>0?'num pos':'num'); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function ym(dateStr){ return dateStr ? dateStr.slice(0,7) : ''; }
  function monthList(){
    const [y,m]=(db.settings.startMonth||'2026-08').split('-').map(Number);
    const arr=[];
    for(let i=0;i<12;i++){ const d=new Date(y,m-1+i,1); arr.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')); }
    return arr;
  }
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

  // ===== 저장: 로컬 캐시 + Google Sheets(Apps Script) 동기화 =====
  const GAS_KEY='cashflow_gas_url';
  let gasUrl=(function(){ try{return localStorage.getItem(GAS_KEY)||'';}catch(e){return '';} })();
  let syncState=gasUrl?'syncing':'local';

  function loadLocal(key, fallback){
    try{ const v=localStorage.getItem(FILES[key]); return v?JSON.parse(v):fallback; }
    catch(e){ return fallback; }
  }
  function saveLocal(key){
    try{ localStorage.setItem(FILES[key], JSON.stringify(db[key])); }catch(e){}
  }
  async function saveFile(key){
    saveLocal(key);
    if(!gasUrl) return;
    syncState='syncing'; updSync();
    try{
      const res=await fetch(gasUrl,{method:'POST',redirect:'follow',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({key:key,data:db[key]})});
      const j=await res.json();
      if(j.status!=='ok') throw new Error(j.message||'sync');
      syncState='ok';
    }catch(e){ syncState='err'; toast('시트 동기화 실패 — 로컬에만 저장됨'); }
    updSync();
  }
  async function pushAll(){
    const res=await fetch(gasUrl,{method:'POST',redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({all:db})});
    const j=await res.json();
    if(j.status!=='ok') throw new Error('push');
  }
  async function pullRemote(){
    const res=await fetch(gasUrl,{redirect:'follow'});
    const j=await res.json();
    if(!j || !j.settings) throw new Error('bad response');
    const empty=!j._hasSettings && !(j.transactions||[]).length && !(j.recurring||[]).length && !(j.debtinvest||[]).length;
    if(empty) return false; // 새 시트: 아직 데이터 없음
    db.settings=j.settings; db.transactions=j.transactions||[];
    db.recurring=j.recurring||[]; db.debtinvest=j.debtinvest||[];
    Object.keys(FILES).forEach(saveLocal);
    return true;
  }
  function updSync(){
    const b=document.getElementById('syncBadge'); if(!b) return;
    const map={ ok:['● Google Sheets 연동됨','#7FD8AF'], syncing:['● 동기화 중…','#F0C674'],
      err:['● 동기화 오류 — 로컬 저장','#FF9B9B'], local:['● 로컬 저장 전용','#9FB0C8'] };
    b.textContent=map[syncState][0]; b.style.color=map[syncState][1];
  }

  // ===== 현금흐름 집계 =====
  function computeCashflow(){
    const months=monthList();
    const idx=Object.fromEntries(months.map((m,i)=>[m,i]));
    const zero=()=>months.map(()=>0);
    const inc={}, exp={}, inv={}, fin={};
    INCOME_CATS.forEach(c=>inc[c]=zero());
    EXPENSE_CATS.forEach(c=>exp[c]=zero());
    INVEST_CATS.forEach(c=>inv[c]=zero());
    FINANCE_CATS.forEach(c=>fin[c]=zero());

    db.transactions.forEach(t=>{
      if(t.status==='보류') return;
      const m=ym(t.actual||t.date); if(!(m in idx)) return;
      const amt=(Number(t.supply)||0)+(Number(t.vat)||0);
      if(t.type==='수입' && inc[t.cat]) inc[t.cat][idx[m]]+=amt;
      else if(t.type==='지출' && exp[t.cat]) exp[t.cat][idx[m]]-=amt;
    });
    db.recurring.forEach(r=>{
      if(r.status!=='활성') return;
      const s=ym(r.start), e=ym(r.end)||'9999-12';
      months.forEach((m,i)=>{
        if(m>=s && m<=e && exp[r.cat]) exp[r.cat][i]-=(Number(r.amount)||0);
      });
    });
    db.debtinvest.forEach(d=>{
      if(d.status==='보류') return;
      const m=ym(d.date); if(!(m in idx)) return;
      const sign=DI_INFLOW[d.cat]?1:-1;
      const amt=sign*(Number(d.amount)||0);
      if(inv[d.cat]) inv[d.cat][idx[m]]+=amt;
      else if(fin[d.cat]) fin[d.cat][idx[m]]+=amt;
    });

    const sum=obj=>months.map((_,i)=>Object.values(obj).reduce((a,arr)=>a+arr[i],0));
    const incSum=sum(inc), expSum=sum(exp), invSum=sum(inv), finSum=sum(fin);
    const net=months.map((_,i)=>incSum[i]+expSum[i]+invSum[i]+finSum[i]);
    const open=[], close=[];
    let c=Number(db.settings.openingCash)||0;
    months.forEach((_,i)=>{ open.push(c); c+=net[i]; close.push(c); });
    return { months, inc, exp, inv, fin, incSum, expSum, invSum, finSum, net, open, close,
      buffer:Number(db.settings.minBuffer)||0 };
  }

  // ===== 렌더링 =====
  const root=document.getElementById('cfApp');
  const TABS=[['dashboard','Dashboard'],['cashflow','Cashflow'],['transactions','Transactions'],
    ['recurring','Recurring'],['debtinvest','DebtInvest'],['settings','Settings']];

  function render(){
    root.innerHTML=`
      <div class="cf-head"><h1>TWOHANDS Cashflow</h1><span class="sub">12개월 현금흐름 전망 · 현금주의</span>
        <span class="sub" id="syncBadge" style="margin-left:auto"></span></div>
      <div class="cf-tabs">${TABS.map(([k,l])=>`<button class="cf-tab ${tab===k?'on':''}" data-tab="${k}">${l}</button>`).join('')}</div>
      <div class="cf-body" id="tabBody"></div>`;
    root.querySelectorAll('.cf-tab').forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; render(); });
    const body=document.getElementById('tabBody');
    if(tab==='dashboard') renderDashboard(body);
    else if(tab==='cashflow') renderCashflow(body);
    else if(tab==='transactions') renderTransactions(body);
    else if(tab==='recurring') renderRecurring(body);
    else if(tab==='debtinvest') renderDebtInvest(body);
    else renderSettings(body);
    updSync();
  }

  function renderDashboard(el){
    const cf=computeCashflow();
    const minCash=Math.min(...cf.close), endCash=cf.close[11];
    const avgNet=cf.net.reduce((a,b)=>a+b,0)/12;
    const underBuf=cf.close.filter(c=>c<cf.buffer).length;
    el.innerHTML=`
      <div class="kpis">
        <div class="kpi"><div class="k">시작월</div><div class="v">${cf.months[0]}</div></div>
        <div class="kpi"><div class="k">기초 현금</div><div class="v">${fmt(cf.open[0])}원</div></div>
        <div class="kpi"><div class="k">12개월 최저 현금</div><div class="v ${minCash<cf.buffer?'neg':''}">${fmt(minCash)}원</div></div>
        <div class="kpi"><div class="k">12개월 말 현금</div><div class="v">${fmt(endCash)}원</div></div>
        <div class="kpi"><div class="k">월평균 순현금흐름</div><div class="v ${avgNet<0?'neg':'pos'}">${fmt(avgNet)}원</div></div>
        <div class="kpi"><div class="k">버퍼 미달 월수</div><div class="v ${underBuf>0?'neg':''}">${underBuf} 개월</div></div>
      </div>
      <div class="cf-card"><h2>월별 순현금흐름 · 기말현금 추이</h2>
        <p class="cf-note">막대: 월 순현금흐름 / 선: 기말 현금 / 점선: 최소 운영 현금 버퍼</p>
        <div class="chart-wrap">${chartSvg(cf)}</div>
      </div>
      <div class="cf-card"><h2>월별 현금 잔액 요약</h2>
        <div class="tbl-wrap"><table class="cf">
          <tr><th>월</th><th class="num" style="text-align:right">기초현금</th><th class="num" style="text-align:right">수입</th><th class="num" style="text-align:right">지출</th>
              <th class="num" style="text-align:right">투자/재무</th><th class="num" style="text-align:right">순현금흐름</th><th class="num" style="text-align:right">기말현금</th><th style="text-align:center">버퍼상태</th></tr>
          ${cf.months.map((m,i)=>`<tr>
            <td>${m}</td><td class="num">${fmt(cf.open[i])}</td>
            <td class="${cls(cf.incSum[i])}">${fmt(cf.incSum[i])}</td>
            <td class="${cls(cf.expSum[i])}">${fmt(cf.expSum[i])}</td>
            <td class="${cls(cf.invSum[i]+cf.finSum[i])}">${fmt(cf.invSum[i]+cf.finSum[i])}</td>
            <td class="${cls(cf.net[i])}">${fmt(cf.net[i])}</td>
            <td class="num" style="font-weight:700">${fmt(cf.close[i])}</td>
            <td>${cf.close[i]>=cf.buffer?'<span class="badge b-ok">정상</span>':'<span class="badge b-warn">위험</span>'}</td>
          </tr>`).join('')}
        </table></div>
      </div>`;
  }

  function chartSvg(cf){
    const W=980,H=280,pad={l:70,r:70,t:16,b:34};
    const iw=(W-pad.l-pad.r)/12;
    const allVals=cf.net.concat(cf.close,[cf.buffer,0]);
    const mx=Math.max(...allVals), mn=Math.min(...allVals);
    const span=(mx-mn)||1;
    const y=v=>pad.t+(mx-v)/span*(H-pad.t-pad.b);
    let bars='',line='',pts='',labels='';
    cf.months.forEach((m,i)=>{
      const x=pad.l+i*iw;
      const h=Math.abs(y(cf.net[i])-y(0));
      bars+=`<rect x="${x+iw*0.18}" y="${Math.min(y(cf.net[i]),y(0))}" width="${iw*0.42}" height="${Math.max(h,1)}"
        fill="${cf.net[i]>=0?'#0E8A5F':'#D64545'}" opacity="0.75" rx="2"></rect>`;
      const cx=x+iw*0.5, cy=y(cf.close[i]);
      line+=(i?'L':'M')+cx+' '+cy+' ';
      pts+=`<circle cx="${cx}" cy="${cy}" r="3.2" fill="#2B5FAD"></circle>`;
      labels+=`<text x="${cx}" y="${H-10}" font-size="10" fill="#4A5A72" text-anchor="middle">${m.slice(2)}</text>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="min-width:min(720px,140vw)" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="현금흐름 차트">
      <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(0)}" y2="${y(0)}" stroke="#C9D2DF"></line>
      <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(cf.buffer)}" y2="${y(cf.buffer)}" stroke="#D64545" stroke-dasharray="5 4" opacity="0.6"></line>
      <text x="${W-pad.r+4}" y="${y(cf.buffer)+4}" font-size="10" fill="#D64545">버퍼</text>
      ${bars}<path d="${line}" fill="none" stroke="#2B5FAD" stroke-width="2.2"></path>${pts}${labels}
      <text x="${pad.l-6}" y="${y(mx)+8}" font-size="10" fill="#4A5A72" text-anchor="end">${fmt(mx)}</text>
      <text x="${pad.l-6}" y="${y(0)+4}" font-size="10" fill="#4A5A72" text-anchor="end">0</text>
    </svg>`;
  }

  function renderCashflow(el){
    const cf=computeCashflow();
    const row=(label,arr,klass)=>{
      const total=arr.reduce((a,b)=>a+b,0);
      return `<tr class="${klass||''}"><td class="sticky-col">${label}</td>
        ${arr.map(v=>`<td class="${cls(v)}">${v?fmt(v):'0'}</td>`).join('')}
        <td class="${cls(total)}" style="font-weight:700">${fmt(total)}</td></tr>`;
    };
    const secHead=t=>`<tr class="row-sec"><td class="sticky-col">${t}</td>${cf.months.map(()=>'<td></td>').join('')}<td></td></tr>`;
    const bufRow=cf.months.map(()=>cf.buffer);
    const over=cf.close.map(c=>c-cf.buffer);
    el.innerHTML=`
      <div class="cf-card">
        <h2>Cashflow — 월별 현금흐름 12개월 전망</h2>

        else toast('시트 데이터를 불러왔습니다');
        syncState='ok';
      }catch(e){ syncState='err'; toast('연결 실패 — URL과 배포 설정(액세스: 모든 사용자)을 확인하세요'); }
      render();
    };
    el.querySelector('#gasPush').onclick=async()=>{
      if(!gasUrl){ toast('먼저 URL을 연결하세요'); return; }
      if(!confirm('시트의 기존 내용을 현재 앱 데이터로 덮어씁니다. 계속할까요?')) return;
      syncState='syncing'; updSync();
      try{ await pushAll(); syncState='ok'; toast('시트로 업로드 완료'); }
      catch(e){ syncState='err'; toast('업로드 실패'); }
      updSync();
    };
    el.querySelector('#gasPull').onclick=async()=>{
      if(!gasUrl){ toast('먼저 URL을 연결하세요'); return; }
      if(!confirm('앱의 현재 데이터를 시트 내용으로 덮어씁니다. 계속할까요?')) return;
      syncState='syncing'; updSync();
      try{ await pullRemote(); syncState='ok'; toast('시트에서 불러왔습니다'); }
      catch(e){ syncState='err'; toast('불러오기 실패'); }
      render();
    };
    el.querySelector('#gasOff').onclick=()=>{
      gasUrl=''; try{ localStorage.removeItem(GAS_KEY); }catch(e){}
      syncState='local'; toast('연동을 해제했습니다 (데이터는 이 브라우저에만 저장)'); render();
    };
    el.querySelectorAll('[data-exp]').forEach(b=>b.onclick=()=>downloadJson(FILES[b.dataset.exp], db[b.dataset.exp]));
    el.querySelector('#expAll').onclick=()=>downloadJson('cashflow_backup_all.json', db);
    el.querySelector('#impFile').onchange=async e=>{
      const file=e.target.files[0]; if(!file) return;
      try{
        const data=JSON.parse(await file.text());
        if(data.settings&&data.transactions){ db=data; }
        else if(Array.isArray(data)){ toast('전체 백업 파일 또는 개별 파일 구조가 필요합니다'); return; }
        else if(data.startMonth!==undefined){ db.settings=data; }
        for(const k of Object.keys(FILES)) await saveFile(k);
        toast('불러오기 완료'); render();
      }catch(err){ toast('파일을 읽을 수 없습니다'); }
    };
    el.querySelector('#resetAll').onclick=async()=>{
      if(!confirm('모든 데이터를 완전히 삭제하고 빈 상태로 초기화할까요?\n(샘플 데이터도 다시 생성되지 않습니다)')) return;
      db.settings={ startMonth:(db.settings&&db.settings.startMonth)||'2026-08', openingCash:0, minBuffer:0, taxMemo:'', basis:'현금주의' };
      db.transactions=[]; db.recurring=[]; db.debtinvest=[];
      for(const k of Object.keys(FILES)) await saveFile(k);
      toast('빈 상태로 초기화했습니다'); render();
    };
  }

  // ----- 공통 헬퍼 -----
  function f(id,label,type,val){ return `<div class="fld"><label>${label}</label><input id="fx_${id}" type="${type}" value="${esc(val)}"></div>`; }
  function sel(id,label,opts,val){ return `<div class="fld"><label>${label}</label><select id="fx_${id}">
    ${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`; }
  function statusBadge(s){
    if(s==='보류') return '<span class="badge b-hold">보류</span>';
    if(s==='확정') return '<span class="badge b-ok">확정</span>';
    if(s==='완료') return '<span class="badge b-done">완료</span>';
    return '<span class="badge b-plan">예정</span>';
  }
  function bindRowBtns(el,key){
    el.querySelectorAll('[data-ed]').forEach(b=>b.onclick=()=>{ editId[key]=b.dataset.ed; render(); window.scrollTo({top:0,behavior:'smooth'}); });
    el.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      if(!confirm('이 항목을 삭제할까요?')) return;
      db[key]=db[key].filter(r=>r.id!==b.dataset.del);
      await saveFile(key); toast('삭제했습니다'); render();
    });
  }
  function downloadJson(name,obj){
    const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
    URL.revokeObjectURL(a.href);
  }

  // ===== 시작 =====
  async function init(){
    root.innerHTML='<div class="empty">데이터를 불러오는 중…</div>';
    db.settings    = loadLocal('settings', null);
    db.transactions= loadLocal('transactions', null);
    db.recurring   = loadLocal('recurring', null);
    db.debtinvest  = loadLocal('debtinvest', null);
    let seeded=false;
    if(!db.settings){ db.settings=JSON.parse(JSON.stringify(SEED.settings)); seeded=true; }
    if(!db.transactions){ db.transactions=JSON.parse(JSON.stringify(SEED.transactions)); seeded=true; }
    if(!db.recurring){ db.recurring=JSON.parse(JSON.stringify(SEED.recurring)); seeded=true; }
    if(!db.debtinvest){ db.debtinvest=JSON.parse(JSON.stringify(SEED.debtinvest)); seeded=true; }
    if(seeded) Object.keys(FILES).forEach(saveLocal);
    if(gasUrl){
      try{
        const had=await pullRemote();
        if(!had) await pushAll(); // 빈 시트면 로컬 데이터를 올려 초기화
        syncState='ok';
      }catch(e){ syncState='err'; toast('시트 연결 실패 — 로컬 데이터를 표시합니다'); }
    }
    render();
  }

  // ===== 비밀번호 잠금 =====
  // 비밀번호는 아래 PASS_HASH(SHA-256)와 비교합니다. 평문은 코드에 없습니다.
  // 비밀번호 변경: 새 비번을 정한 뒤 브라우저 콘솔에서
  //   crypto.subtle.digest('SHA-256', new TextEncoder().encode('새비번'))
  //     .then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
  // 로 나온 해시 문자열을 PASS_HASH 값에 붙여넣으세요.
  const PASS_HASH='779aa45dc60f0d4031e86d1327d6cd26ff9db1358df7b9e840714ff327623574';
  const GATE_KEY='cashflow_gate_ok';
  async function sha256(str){
    const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  function showGate(){
    root.innerHTML=`
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--paper);padding:20px">
        <div class="cf-card" style="max-width:340px;width:100%;text-align:center">
          <div style="width:44px;height:44px;border-radius:12px;background:var(--ink);color:#fff;font-size:22px;
            display:flex;align-items:center;justify-content:center;margin:4px auto 12px">₩</div>
          <h2 style="justify-content:center">법인 운영 Cashflow</h2>
          <p class="cf-note" style="text-align:center">비밀번호를 입력하세요.</p>
          <div class="fld" style="margin-bottom:10px">
            <input id="gatePw" type="password" placeholder="비밀번호" autofocus
              style="width:100%;text-align:center;font-size:15px;padding:9px">
          </div>
          <label style="display:flex;align-items:center;gap:6px;justify-content:center;font-size:12px;color:var(--ink2);margin-bottom:12px">
            <input type="checkbox" id="gateRemember" checked> 이 기기에서 다음부터 묻지 않기</label>
          <button class="btn btn-p" id="gateBtn" style="width:100%">들어가기</button>
          <p id="gateErr" style="color:var(--out);font-size:12.5px;margin:10px 0 0;min-height:16px"></p>
        </div>
      </div>`;
    const pw=document.getElementById('gatePw');
    const err=document.getElementById('gateErr');
    const submit=async()=>{
      const h=await sha256(pw.value);
      if(h===PASS_HASH){
        if(document.getElementById('gateRemember').checked){ try{ sessionStorage.setItem(GATE_KEY,'1'); localStorage.setItem(GATE_KEY,h); }catch(e){} }
        else { try{ sessionStorage.setItem(GATE_KEY,'1'); }catch(e){} }
        init();
      } else { err.textContent='비밀번호가 올바르지 않습니다.'; pw.value=''; pw.focus(); }
    };
    document.getElementById('gateBtn').onclick=submit;
    pw.onkeydown=e=>{ if(e.key==='Enter') submit(); };
  }

  // 게이트 판단: 해시가 기본 플레이스홀더면 잠금 없이 통과(설정 전),
  // 이미 이 기기에서 인증했으면 통과, 아니면 입력창 표시.
  (function boot(){
    let remembered=false;
    try{ remembered = sessionStorage.getItem(GATE_KEY)==='1' || localStorage.getItem(GATE_KEY)===PASS_HASH; }catch(e){}
    if(PASS_HASH==='__PASS_HASH__' || remembered) init();
    else showGate();
  })();
})();
</script>
</body>
</html>
